{% extends "base.html" %}
{% block title %}Delete Newsletter – Breaking News{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="bn-form-card">
      <div class="bn-form-header" style="background:linear-gradient(135deg,#7f1d1d,#991b1b);">
        <div class="d-flex align-items-center gap-3">
          <div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">
            <i class="bi bi-trash3-fill"></i>
          </div>
          <div>
            <h2 class="mb-0">Delete Newsletter</h2>
            <p class="mb-0">This cannot be undone.</p>
          </div>
        </div>
      </div>
      <div class="bn-form-body text-center">
        <div style="background:var(--bn-gray-50);border-radius:var(--bn-radius);padding:1.5rem;margin-bottom:1.5rem;border:1px solid var(--bn-gray-200);">
          <i class="bi bi-envelope-open" style="font-size:2rem;color:var(--bn-muted);display:block;margin-bottom:.5rem;"></i>
          <p class="fs-5 mb-1">&ldquo;<strong>{{ newsletter.title }}</strong>&rdquo;</p>
        </div>
        <p class="text-muted mb-4">Are you sure you want to permanently delete this newsletter?</p>
        <form method="post" class="d-flex gap-3 justify-content-center">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash3 me-1"></i>Yes, Delete
          </button>
          <a href="{% url 'newsletter_detail' newsletter.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
